<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Queue AI | Live Demo</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      color: #38bdf8;
    }

    h3 {
      color: #facc15;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .token {
      font-size: 40px;
      margin: 20px 0;
      color: #22c55e;
    }

    .status {
      margin-top: 15px;
      font-size: 18px;
    }

    .time {
      margin-top: 10px;
      font-size: 16px;
      color: #facc15;
    }

    .serving {
      margin-top: 10px;
      font-size: 18px;
      color: #fb7185;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Smart Queue System 🚀</h1>

    <!-- REAL WORLD FEEL -->
    <h3>🏥 Hospital OPD Queue</h3>
    <p>Scan QR or click below to join the hospital queue</p>
    <p>🚀 Live demo of digital queue system</p>

    <button onclick="joinQueue()">Join Queue</button>

    <div class="token" id="token">--</div>

    <div class="serving">
      Now Serving: <span id="serving">0</span>
    </div>

    <div class="status" id="status">Not in queue</div>

    <div class="time" id="time"></div>

    <button onclick="nextPerson()">Next Person</button>
    <button onclick="resetQueue()">Reset Queue</button>
  </div>

  <script>
    let currentToken = 0;
    let servingToken = 0;
    let userToken = null;

    function joinQueue() {
      currentToken++;
      userToken = currentToken;

      document.getElementById("token").innerText = "Token #" + userToken;
      updateStatus();
    }

    function nextPerson() {
      if (servingToken < currentToken) {
        servingToken++;
        updateStatus();
      }
    }

    function resetQueue() {
      currentToken = 0;
      servingToken = 0;
      userToken = null;

      document.getElementById("token").innerText = "--";
      document.getElementById("status").innerText = "Queue reset";
      document.getElementById("time").innerText = "";
      document.getElementById("serving").innerText = "0";
    }

    function updateStatus() {
      document.getElementById("serving").innerText = servingToken;

      if (userToken === null) {
        document.getElementById("status").innerText = "Not in queue";
        document.getElementById("time").innerText = "";
      } 
      else if (userToken === servingToken) {
        document.getElementById("status").innerText = "👉 It's your turn!";
        document.getElementById("time").innerText = "Please proceed now";

        // ALERT FEATURE 🔥
        alert("It's your turn!");
      } 
      else {
        let wait = userToken - servingToken;

        document.getElementById("status").innerText =
          "People ahead: " + wait;

        document.getElementById("time").innerText =
          "Estimated wait: " + (wait * 2) + " mins";
      }
    }
  </script>

</body>
</html>
